<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Introduction</title>
    <style>
        :root {
            --bg: #0b1020;
            --card: #121a33;
            --text: #e9ecff;
            --muted: #b8c0ff;
            --accent: #7c5cff;
        }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: radial-gradient(1200px 600px at 10% 0%, #1a2a6c33, transparent),
                        radial-gradient(1000px 500px at 90% 20%, #7c5cff22, transparent),
                        var(--bg);
            color: var(--text);
        }
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 28px 16px 48px;
        }
        .header {
            display: grid;
            gap: 8px;
            margin-bottom: 18px;
        }
        .header h1 {
            font-size: 28px;
            margin: 0;
            letter-spacing: 0.2px;
        }
        .header p {
            margin: 0;
            color: var(--muted);
            line-height: 1.45;
        }
        .card {
            background: linear-gradient(180deg, #ffffff10, transparent), var(--card);
            border: 1px solid #ffffff1a;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 16px 40px #00000055;
        }
        .video-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        .video-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
            align-items: center;
            justify-content: space-between;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #ffffff24;
            background: #ffffff10;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
        }
        .btn.primary {
            background: linear-gradient(135deg, var(--accent), #4dd4ff);
            border-color: transparent;
            color: #0b1020;
        }
        .hint {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }
        code {
            background: #00000033;
            padding: 2px 6px;
            border-radius: 8px;
            border: 1px solid #ffffff1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Giới thiệu video YouTube</h1>
            <p>Xem trực tiếp video ngay trên trang này hoặc bấm nút để mở trên YouTube.</p>
        </div>

        <div class="card">
            <div class="video-wrap">
                <iframe
                        src="https://www.youtube.com/embed/VIDEO_ID"
                        title="YouTube video player"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                </iframe>
            </div>

            <div class="actions">
                <a class="btn primary" href="https://www.youtube.com/watch?v=VIDEO_ID" target="_blank" rel="noopener noreferrer">
                    Mở video trên YouTube
                </a>
                <div class="hint">
                    Thay <code>VIDEO_ID</code> bằng ID của video (vd: <code>watch?v=abc123</code> thì ID là <code>abc123</code>).
                </div>
            </div>
        </div>
    </div>
</body>
</html>
